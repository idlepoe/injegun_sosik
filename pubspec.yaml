name: injegun_sosik
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.9.2
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_auth: ^6.1.4
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  cloud_firestore: ^6.1.2
  cached_network_image: ^3.3.1
  carousel_slider: 5.1.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.10.0
  intl: ^0.19.0
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.2
  share_plus: ^10.1.2
  in_app_review: ^2.0.11
  flex_seed_scheme: ^3.6.1
  flutter_local_notifications: ^20.1.0
  flutter_launcher_icons: ^0.14.4
  package_info_plus: ^8.0.2
  swipeable_page_route: ^0.4.8
  flutter_html: ^3.0.0
  google_maps_flutter: ^2.14.2
  upgrader: ^12.5.0
  go_router: ^17.1.0
  flutter_bloc: ^9.1.1
  cell_calendar: ^0.9.0
  table_calendar: ^3.1.3
  flutter_pdfview: ^1.4.4
  path_provider: ^2.1.4
  http: ^1.2.2
  flutter_icon_snackbar: ^1.2.1
  photo_view: 0.15.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.11.1
  freezed: ^3.2.5
  json_serializable: ^6.12.0
  bloc_lint: ^0.4.0
flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icon/
    - assets/weather_icon/
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_foreground: "assets/icon/icon.png"
  adaptive_icon_background: "#5F8F3C"
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#FFFFFF"
    theme_color: "#FFFFFF"
